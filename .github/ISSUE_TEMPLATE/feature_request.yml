name: Feature Request
description: Suggest an idea for Worldwave
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear description of what the problem is.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Any alternative solutions or workarounds.
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: How would this feature benefit other users?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context or screenshots.

name: Bug Report
description: Something isn't working as expected
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: describe
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run `ww ...`
        2. Send message `...`
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Ubuntu 24.04, macOS 15, Windows 11
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.12.4
  - type: input
    id: version
    attributes:
      label: Worldwave version
      placeholder: e.g. 0.5.0, commit abc1234
  - type: dropdown
    id: install
    attributes:
      label: Installation method
      options:
        - deploy.sh
        - pip install
        - git clone
        - other
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: If applicable, add logs. Run with `WW_VERBOSE=true` for detail.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  WW_HOME: ${{ github.workspace }}
  WW_DATA_DIR: ${{ github.workspace }}/data/subconscious
  DEEPSEEK_API_KEY: test-key-ci

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          pip-${{ runner.os }}-${{ matrix.python-version }}-

    - name: Install deps
      run: |
        pip install fastapi uvicorn pydantic httpx requests pytest cryptography grpcio protobuf python-dotenv

    - name: Test
      run: |
        python -m pytest tests/ -v --tb=short

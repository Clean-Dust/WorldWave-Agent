name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  WW_HOME: ${{ github.workspace }}
  WW_DATA_DIR: ${{ github.workspace }}/data/subconscious
  DEEPSEEK_API_KEY: test-key-ci

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          pip-${{ runner.os }}-${{ matrix.python-version }}-

    - name: Install deps
      run: |
        pip install fastapi uvicorn pydantic httpx requests pytest cryptography grpcio protobuf python-dotenv

    - name: Secret scan
      run: |
        echo "Scanning for hardcoded secrets..."
        if grep -rPn --include='*.py' --include='*.sh' --include='*.js' --include='*.ts' \
          --include='*.json' --include='*.yml' --include='*.yaml' --include='*.toml' \
          --include='*.md' --include='*.txt' \
          -e 'sk-[a-zA-Z0-9]{20,}' \
          -e 'sk-or-[a-zA-Z0-9]{20,}' \
          -e 'sk-ant-[a-zA-Z0-9]{20,}' \
          -e '[0-9]{8,10}:[a-zA-Z0-9_-]{35,}' \
          -e 'ghp_[a-zA-Z0-9]{36}' \
          . \
          --exclude-dir='.git' --exclude-dir='.venv' --exclude-dir='__pycache__' \
          --exclude-dir='tests' --exclude-dir='.mypy_cache' \
          | grep -vE '(DEEPSEEK_API_KEY|OPENAI_API_KEY|OPENROUTER_API_KEY|ANTHROPIC_API_KEY|TELEGRAM.*TOKEN|\.env\.example|\.secrets\.baseline)'; then
          echo ""
          echo "⛔ SECRETS DETECTED — commit blocked"
          echo "   Use environment variables (.env) instead."
          exit 1
        fi
        echo "✓ No secrets found"

    - name: Test
      run: |
        python -m pytest tests/ -v --tb=short

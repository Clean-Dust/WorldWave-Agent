name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  WW_HOME: ${{ github.workspace }}
  WW_DATA_DIR: ${{ github.workspace }}/data/subconscious
  DEEPSEEK_API_KEY: test-key-ci

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install deps
      run: |
        pip install fastapi uvicorn pydantic httpx requests pytest cryptography

    - name: Test
      run: |
        python -m pytest tests/ -v --tb=short

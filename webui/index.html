<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>Worldwave AI</title>
  <link rel="manifest" href="manifest.json">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#1a1a2e;--surface:#16213e;--primary:#3D6B80;--accent:#e94560;--text:#e0e0e0;--dim:#888;--border:#2a2a4a}
    body{font:14px system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
    #sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px;gap:12px}
    #sidebar h2{font-size:16px;color:var(--primary);margin-bottom:8px}
    #sidebar input{width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font:inherit}
    #tools-list{flex:1;overflow-y:auto}
    .tool-item{padding:6px 8px;border-radius:4px;cursor:pointer;font-size:12px;color:var(--dim)}
    .tool-item:hover{background:var(--primary);color:var(--text)}
    #main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    #chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
    .msg{padding:10px 14px;border-radius:8px;max-width:80%;line-height:1.5}
    .msg.user{align-self:flex-end;background:var(--primary);color:#fff}
    .msg.assistant{align-self:flex-start;background:var(--surface);border:1px solid var(--border)}
    .msg pre{font-size:12px;background:var(--bg);padding:8px;border-radius:4px;overflow-x:auto;margin:4px 0}
    #input-row{padding:12px 16px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:8px}
    #input-row textarea{flex:1;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font:inherit;resize:none;min-height:40px;max-height:120px}
    #input-row button{padding:8px 16px;background:var(--primary);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600}
    #input-row button:hover{opacity:.9}
    .diff-container{margin:12px 0;border:1px solid var(--border);border-radius:6px;overflow:hidden}
    .diff-hunk{padding:4px 12px;font-size:12px;font-family:monospace}
    .diff-add{background:#1a3a1a;color:#4caf50}
    .diff-rem{background:#3a1a1a;color:#f44336}
    .diff-header{background:var(--surface);color:var(--dim);padding:4px 12px;font-size:11px}
    .status-bar{background:var(--surface);border-top:1px solid var(--border);padding:6px 16px;font-size:12px;color:var(--dim);display:flex;justify-content:space-between}
    .badge{background:var(--primary);color:#fff;padding:2px 8px;border-radius:10px;font-size:10px}
    #loading{display:none;text-align:center;padding:8px;color:var(--dim)}
  </style>
</head>
<body>
  <div id="sidebar">
    <h2>⚡ Worldwave AI</h2>
    <input id="tool-search" placeholder="Search tools (154 available)..." oninput="filterTools()">
    <div id="tools-list"></div>
    <div style="border-top:1px solid var(--border);padding-top:8px;font-size:11px;color:var(--dim)">
      <div id="status-indicator">🟢 Connected</div>
      <div style="margin-top:4px">Sessions: <span id="session-count">0</span></div>
    </div>
  </div>
  <div id="main">
    <div id="chat-area">
      <div class="msg assistant">👋 Welcome to Worldwave AI. Ask me anything, send code to edit, or run tools.</div>
    </div>
    <div id="loading">⏳ Processing...</div>
    <div id="input-row">
      <textarea id="user-input" placeholder="Ask WW..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      <button onclick="sendMessage()">Send</button>
    </div>
    <div class="status-bar">
      <span>WW v0.5 · PWA</span>
      <span id="connection-status" class="badge">online</span>
    </div>
  </div>
  <script src="src/app.js"></script>
</body>
</html>
